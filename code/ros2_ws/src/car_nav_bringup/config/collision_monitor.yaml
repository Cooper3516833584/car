collision_monitor:
  ros__parameters:
    base_frame_id: base_link
    odom_frame_id: odom
    cmd_vel_in_topic: /cmd_vel_smoothed
    cmd_vel_out_topic: /cmd_vel
    enable_stamped_cmd_vel: false
    polygons: [stop_zone, slowdown_zone]
    stop_zone:
      type: polygon
      action_type: stop
      min_points: 4
      visualize: true
      polygon_pub_topic: polygon_stop
      points: "[[0.31, 0.13], [0.31, -0.13], [-0.20, -0.13], [-0.20, 0.13]]"
    slowdown_zone:
      type: polygon
      action_type: slowdown
      min_points: 4
      slowdown_ratio: 0.35
      visualize: true
      polygon_pub_topic: polygon_slow
      points: "[[0.50, 0.22], [0.50, -0.22], [-0.35, -0.22], [-0.35, 0.22]]"
    observation_sources: [scan]
    scan:
      type: scan
      topic: /scan
      source_timeout: 0.2
      enabled: true
